<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نود</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Cairo', Arial, sans-serif;
      margin: 0;
      background: #f5f1e6;
      direction: rtl;
      color: #1f3d2b;
    }

    header {
      background: linear-gradient(120deg, #1f3d2b, #3e6b4f);
      color: #f5f1e6;
      padding: 25px 20px;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 36px;
      font-family: 'Amiri', serif;
    }

    .container {
      max-width: 800px;
      margin: 30px auto;
      padding: 0 15px;
    }

    .section-title {
      font-size: 20px;
      margin-bottom: 15px;
      border-right: 5px solid #3e6b4f;
      padding-right: 10px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .item {
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
      border: 1px solid #e8e2d3;
    }

    .item img {
      width: 75px;
      height: 75px;
      object-fit: cover;
      border-radius: 12px;
    }

    .info {
      flex: 1;
      margin-right: 15px;
    }

    .price {
      font-size: 18px;
      font-weight: bold;
      color: #3e6b4f;
      margin-left: 10px;
    }

    .btn {
      background: #1f3d2b;
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<header>
  <h1>نود</h1>
</header>

<div class="container">

  <div class="section-title">☕ القهوة</div>

  <div class="menu">

    <div class="item">
      <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
      <div class="info">
        <h3>قهوة اليوم (حار)</h3>
      </div>
      <div class="price">8 ريال</div>
      <button class="btn">+</button>
    </div>

    <div class="item">
      <img src="https://images.unsplash.com/photo-1498804103079-a6351b050096">
      <div class="info">
        <h3>قهوة اليوم (بارد)</h3>
      </div>
      <div class="price">8 ريال</div>
      <button class="btn">+</button>
    </div>

    <div class="item">
      <img src="https://images.unsplash.com/photo-1470337458703-46ad1756a187">
      <div class="info">
        <h3>V60 (حار)</h3>
      </div>
      <div class="price">12 ريال</div>
      <button class="btn">+</button>
    </div>

    <div class="item">
      <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085">
      <div class="info">
        <h3>V60 (بارد)</h3>
      </div>
      <div class="price">12 ريال</div>
      <button class="btn">+</button>
    </div>

  </div>

  <div class="section-title">🍰 الحلويات</div>

  <div class="menu">

    <div class="item">
      <img src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e">
      <div class="info">
        <h3>كوكيز</h3>
      </div>
      <div class="price">10 ريال</div>
      <button class="btn">+</button>
    </div>

    <div class="item">
      <img src="https://images.unsplash.com/photo-1571877227200-a0d98ea607e9">
      <div class="info">
        <h3>تراميسو</h3>
      </div>
      <div class="price">14 ريال</div>
      <button class="btn">+</button>
    </div>

    <div class="item">
      <img src="https://images.unsplash.com/photo-1555507036-ab794f4afe5c">
      <div class="info">
        <h3>كروسان</h3>
      </div>
      <div class="price">9 ريال</div>
      <button class="btn">+</button>
    </div>

  </div>

</div>

<footer>
  © 2026 نود
</footer>

</body>
</html>
