<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="أفضل مسلسلات 2025 حسب تقييمات IMDb - دليلك الشامل لأفضل الأعمال الدرامية لهذا العام">
    <meta name="theme-color" content="#1A3D2F">
    <title>أفضل مسلسلات 2025 | IMDb Ratings</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #F5F0E8;
            --bg-secondary: #FFFFFF;
            --text-primary: #1A1A2E;
            --text-secondary: #555;
            --accent: #F5C518;
            --accent-dark: #E2B013;
            --card-bg: #FFFFFF;
            --shadow: 0 8px 20px rgba(0,0,0,0.08);
            --border: #E8E0D5;
            --imdb-color: #f5c518;
        }

        [data-theme="dark"] {
            --bg-primary: #121212;
            --bg-secondary: #1E1E2E;
            --text-primary: #F5F0E8;
            --text-secondary: #AAAAAA;
            --card-bg: #2A2A3A;
            --shadow: 0 8px 20px rgba(0,0,0,0.3);
            --border: #3A3A4A;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        /* هيدر */
        .hero {
            background: linear-gradient(135deg, #1A3D2F 0%, #0F261D 100%);
            padding: 60px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: "⭐";
            position: absolute;
            font-size: 180px;
            opacity: 0.05;
            bottom: -30px;
            left: -30px;
        }

        .hero::after {
            content: "🎬";
            position: absolute;
            font-size: 150px;
            opacity: 0.05;
            top: -20px;
            right: -20px;
        }

        .hero h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #FFFFFF;
            margin-bottom: 15px;
        }

        .hero h1 i {
            color: var(--accent);
            margin-left: 10px;
        }

        .hero p {
            color: #C4A77D;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* شريط الأدوات */
        .toolbar {
            max-width: 1200px;
            margin: -25px auto 0;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .toolbar-content {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        /* مربع البحث */
        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .search-box input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border: 1px solid var(--border);
            border-radius: 30px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* أزرار التصفية */
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 18px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .filter-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .filter-btn:hover {
            background: var(--accent);
            color: #000;
        }

        /* وضع التبديل */
        .theme-toggle {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 8px 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }

        /* الإحصائيات */
        .stats {
            max-width: 1200px;
            margin: 30px auto 0;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-card {
            background: var(--bg-secondary);
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
            flex: 1;
            min-width: 120px;
            border: 1px solid var(--border);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* شبكة المسلسلات */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .series-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* بطاقة المسلسل */
        .series-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid var(--border);
            animation: fadeInUp 0.5s ease;
        }

        .series-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .card-image {
            position: relative;
            height: 200px;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .series-card:hover .card-image img {
            transform: scale(1.05);
        }

        .rating-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--imdb-color);
            color: #000;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .platform-badge {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card-info {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .card-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .imdb-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--imdb-color);
            color: #000;
            padding: 8px 15px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.2s;
        }

        .imdb-link:hover {
            background: #e2b013;
        }

        /* رسالة عدم وجود نتائج */
        .no-results {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        /* فوتر */
        footer {
            background: var(--bg-secondary);
            padding: 30px;
            text-align: center;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }

        /* أنيميشن */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* تحسينات للجوال */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
            .toolbar-content {
                flex-direction: column;
            }
            .filter-buttons {
                justify-content: center;
            }
            .stats {
                flex-direction: column;
            }
            .series-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

            },
            {
                id: 11,
                title: "The Pitt",
                arabicTitle: "ذا بيت",
                rating: 8.9,

                year: "2025",
                seasons: 1,

            },
            {
                id: 12,
                title: "Peacemaker",
                arabicTitle: "بيس ميكر",
                rating: 8.2,
                platform: "HBO",
                year: "2025",
                seasons: 2,
                image: "https://images.unsplash.com/photo-1616530946255-8f5a6f5f6f5a?w=400&h=300&fit=crop",
                description: "الموسم الثاني من مغامرات كريس سميث (بيس ميكر) مع تحديات جديدة وتهديدات غير متوقعة للعالم.",
                imdbUrl: "https://www.imdb.com/title/tt13146438/"
            }
        ];

        // ترتيب المسلسلات حسب التقييم
        let filteredSeries = [...seriesData].sort((a, b) => b.rating - a.rating);
        let currentPlatform = "all";
        let currentSearch = "";

        // عناصر DOM
        const seriesGrid = document.getElementById('seriesGrid');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const statsDiv = document.getElementById('stats');
        const themeToggle = document.getElementById('themeToggle');

        // عرض الإحصائيات
        function updateStats() {
            const total = filteredSeries.length;
            const avgRating = (filteredSeries.reduce((sum, s) => sum + s.rating, 0) / total).toFixed(1);
            const topRating = Math.max(...filteredSeries.map(s => s.rating));
            
            statsDiv.innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${total}</div>
                    <div class="stat-label">مسلسل</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${avgRating}</div>
                    <div class="stat-label">متوسط التقييم</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">⭐ ${topRating}</div>
                    <div class="stat-label">أعلى تقييم</div>
                </div>
            `;
        }

        // عرض البطاقات
        function displaySeries() {
            let data = [...seriesData].sort((a, b) => b.rating - a.rating);
            
            // تصفية حسب المنصة
            if (currentPlatform !== "all") {
                data = data.filter(s => s.platform === currentPlatform);
            }
            
            // تصفية حسب البحث
            if (currentSearch) {
                data = data.filter(s => 
                    s.title.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    s.arabicTitle.includes(currentSearch)
                );
            }
            
            filteredSeries = data;
            updateStats();
            
            if (data.length === 0) {
                seriesGrid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-tv" style="font-size: 3rem; margin-bottom: 15px; display: block;"></i>
                        لا توجد نتائج مطابقة لبحثك
                    </div>
                `;
                return;
            }
            
            seriesGrid.innerHTML = data.map(series => `
                <div class="series-card">
                    <div class="card-image">
                        <img src="${series.image}" alt="${series.title}" loading="lazy">
                        <div class="rating-badge">
                            <i class="fas fa-star"></i> ${series.rating}
                        </div>
                        <div class="platform-badge">
                            <i class="fas fa-tv"></i> ${series.platform}
                        </div>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${series.title}</h3>
                        <div class="card-info">
                            <span><i class="far fa-calendar-alt"></i> ${series.year}</span>
                            <span><i class="fas fa-layer-group"></i> ${series.seasons} مواسم</span>
                        </div>
                        <p class="card-desc">${series.description}</p>
                        <a href="${series.imdbUrl}" target="_blank" rel="noopener noreferrer" class="imdb-link">
                            <i class="fab fa-imdb"></i> عرض على IMDb
                        </a>
                    </div>
                </div>
            `).join('');
        }

        // البحث
        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value;
            displaySeries();
        });

        // أزرار التصفية
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPlatform = btn.dataset.platform;
                displaySeries();
            });
        });

        // الوضع الداكن
        let isDark = localStorage.getItem('theme') === 'dark';
        if (isDark) {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i><span>وضع فاتح</span>';
        }
        
        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            if (isDark) {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i><span>وضع فاتح</span>';
            } else {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i><span>وضع داكن</span>';
            }
        });

        // تهيئة الصفحة
        displaySeries();
    </script>
</body>
</html>
