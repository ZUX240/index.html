            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(123, 47, 157, 0.15) 0%, rgba(10, 10, 15, 1) 100%);
            z-index: -2;
        }

        .bg-gradient::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(45deg, rgba(255,215,0,0.02) 0px, rgba(255,215,0,0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: -1;
        }

        /* هيدر */
        .hero {
            text-align: center;
            padding: 60px 20px 40px;
            position: relative;
            overflow: hidden;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-gold) 0%, #FFA500 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
        }

        .hero h1 i {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: var(--primary-gold);
        }

        .hero p {
            color: var(--text-dim);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .hero-stat {
            text-align: center;
        }

        .hero-stat .number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-gold);
        }

        .hero-stat .label {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* شريط الأدوات */
        .toolbar {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .toolbar-content {
            background: rgba(20, 20, 35, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-glow);
            box-shadow: var(--shadow-neon);
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-gold);
        }

        .search-box input {
            width: 100%;
            padding: 12px 50px 12px 20px;
            border: 1px solid var(--border-glow);
            border-radius: 40px;
            background: rgba(0,0,0,0.5);
            color: var(--text-light);
            font-family: inherit;
            font-size: 0.9rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary-gold);
            box-shadow: 0 0 10px rgba(255,215,0,0.3);
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-btn {
            padding: 8px 18px;
            border: 1px solid var(--border-glow);
            background: rgba(0,0,0,0.5);
            color: var(--text-dim);
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .filter-btn.active {
            background: var(--primary-gold);
            color: #000;
            border-color: var(--primary-gold);
        }

        .filter-btn:hover {
            background: var(--primary-gold-dark);
            color: #000;
        }

        /* حاوية المسلسلات */
        .container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .series-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;

        .series-card {

            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(5px);
            border: 1px solid var(--border-glow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .series-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px rgba(255,215,0,0.2);

            height: 220px;
            overflow: hidden;
        }

            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

            transform: scale(1.1);
        }

            }

</head>

            "The Boys": "https://images.unsplash.com/photo-1531259683007-016a7b7fc3a8?w=500&h=300&fit=crop",
            "House of the Dragon": "https://images.unsplash.com/photo-1616530946255-8f5a6f5f6f5b?w=500&h=300&fit=crop",
            "Stranger Things": "https://images.unsplash.com/photo-1574267432553-4b4628081c32?w=500&h=300&fit=crop"
        };

        // ترتيب المسلسلات حسب التقييم
        let filteredSeries = [...seriesData].sort((a, b) => b.rating - a.rating);
        let currentPlatform = "all";
        let currentSearch = "";

        const seriesGrid = document.getElementById('seriesGrid');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');

        function updateStats() {
            const total = filteredSeries.length;
            const avgRating = (filteredSeries.reduce((sum, s) => sum + s.rating, 0) / total).toFixed(1);
            const topRating = Math.max(...filteredSeries.map(s => s.rating));
            
            document.getElementById('totalCount').innerText = total;
            document.getElementById('avgRating').innerText = avgRating;
            document.getElementById('topRating').innerText = `⭐ ${topRating}`;
        }

        function displaySeries() {
            let data = [...seriesData].sort((a, b) => b.rating - a.rating);
            
            if (currentPlatform !== "all") {
                data = data.filter(s => s.platform === currentPlatform);
            }
            
            if (currentSearch) {
                data = data.filter(s => 
                    s.title.toLowerCase().includes(currentSearch.toLowerCase())
                );
            }
            
            filteredSeries = data;
            updateStats();
            
            if (data.length === 0) {
                seriesGrid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-tv"></i>
                        <h3>لا توجد نتائج مطابقة</h3>
                        <p>حاول البحث بكلمة مختلفة</p>
                    </div>
                `;
                return;
            }
            
            seriesGrid.innerHTML = data.map(series => {
                const imageUrl = imageFallbacks[series.title] || `https://picsum.photos/500/300?random=${series.id}`;
                return `
                    <div class="series-card">
                        <div class="card-image">
                            <img src="${imageUrl}" alt="${series.title}" loading="lazy">
                            <div class="rating-badge">
                                <i class="fas fa-star"></i> ${series.rating}
                            </div>
                            <div class="platform-badge">
                                <i class="fas ${getPlatformIcon(series.platform)}"></i> ${series.platform}
                            </div>
                            <div class="year-badge">
                                <i class="far fa-calendar-alt"></i> ${series.year}
                            </div>
                        </div>
                        <div class="card-content">
                            <div class="card-title">
                                <span>${series.title}</span>
                            </div>
                            <div class="seasons-info">
                                <i class="fas fa-layer-group"></i> ${series.seasons} مواسم
                            </div>
                            <p class="card-desc">${series.description}</p>
                            <a href="${series.imdbUrl}" target="_blank" rel="noopener noreferrer" class="imdb-link">
                                <i class="fab fa-imdb"></i> عرض التفاصيل على IMDb
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getPlatformIcon(platform) {
            const icons = {
                "HBO": "fa-tv",
                "Netflix": "fa-film",
                "Apple TV+": "fa-apple",
                "Disney+": "fa-star",
                "Paramount+": "fa-mountain",
                "Amazon": "fa-amazon"
            };
            return icons[platform] || "fa-tv";
        }

        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value;
            displaySeries();
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPlatform = btn.dataset.platform;
                displaySeries();
            });
        });

        displaySeries();
    </script>
</body>
</html>
