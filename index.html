<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TREE | قائمة القهوة والحلا</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Noto+Sans+Arabic:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1A3D2F; 
            --accent: #C4A77D;  
            --bg: #F3E5DC;      
            --text: #222c26;
            --white: #ffffff;
            --wood: #6F4E37;    
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* الهيدر والشعار */
        header {
            background: linear-gradient(rgba(26, 61, 47, 0.85), rgba(18, 34, 25, 0.9)),
                        url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1200&q=80') center/cover;
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--white);
            padding: 20px;
            border-bottom: 6px solid var(--wood);
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .tree-coffee-icon {
            width: clamp(40px, 8vw, 60px);
            fill: var(--accent);
        }

        header h1 { 
            font-family: 'Amiri', serif; 
            font-size: clamp(45px, 10vw, 85px); 
            line-height: 1;
        }

        /* المنيو السريع */
        .nav-container {
            position: sticky;
            top: 15px;
            z-index: 1000;
            width: 90%;
            max-width: 500px;
            margin: -25px auto 30px auto;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 8px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-bottom: 3px solid var(--wood);
        }

        .nav-tabs { display: flex; justify-content: space-around; list-style: none; }
        .nav-tabs a {
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
            padding: 8px 15px;
            border-radius: 25px;
            transition: 0.3s;
        }
        .nav-tabs a:hover { background: var(--primary); color: var(--white); }

        .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        .section-title { text-align: center; font-family: 'Amiri', serif; font-size: 2.5rem; margin-bottom: 40px; color: var(--primary); }

        /* الكروت */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 20px; }
        .card-info h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--primary); }
        .card-info .price { 
            color: var(--white); 
            font-weight: 700; 
            background: var(--primary);
            padding: 2px 10px;
            border-radius: 5px;
            float: left;
        }
        .card-info p { font-size: 0.85rem; color: #666; clear: both; margin-top: 10px; }

        footer { background: var(--wood); color: var(--white); text-align: center; padding: 40px 20px; margin-top: 50px; }
        footer .logo { font-family: 'Amiri', serif; font-size: 2rem; }
    </style>
</head>
<body>

<header>
    <div class="brand-wrapper">
        <svg class="tree-coffee-icon" viewBox="0 0 100 100">
            <path d="M50,10 C25,10 5,30 5,55 C5,80 25,90 50,90 C75,90 95,80 95,55 C95,30 75,10 50,10 Z M50,20 C70,20 85,35 85,55 C85,75 70,80 50,80 C30,80 15,75 15,55 C15,35 30,20 50,20 Z" />
            <path d="M50,30 L40,55 L45,55 L40,70 L60,70 L55,55 L60,55 L50,30 Z" />
        </svg>
        <h1>TREE</h1>
    </div>
    <p>جذور الجودة.. في كل رشفة</p>
</header>

<div class="nav-container">
    <nav class="nav-tabs">
        <a href="#coffee">القهوة</a>
        <a href="#sweets">الحلا</a>
        <a href="#branches">الفروع</a>
    </nav>
</div>
